<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý bài viết</title>

    <link rel="stylesheet" href="../css/article_manager.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

    <header>
        <div class="top-right">
            <i class="fa-regular fa-envelope"></i>
            <i class="fa-regular fa-bell"></i>
            <div id="authButtons"></div>
        </div>
    </header>

    <div class="container">

        <aside class="sidebar">
            <a href="../pages/user_manager.html">
                <i class="fa-solid fa-users"></i> Manage Users
            </a>

            <a href="../pages/entries_manager.html">
                <i class="fa-solid fa-table-list"></i> Manage Entries
            </a>

            <a href="../pages/article_manager.html">
                <i class="fa-solid fa-newspaper"></i> Manage Article
            </a>

            <a href="../pages/login.html" id="logoutBtn">
                <i class="fa-solid fa-right-from-bracket"></i> Log out
            </a>
        </aside>

        <main class="content">

            <div class="top-section">
                <a href="form_addBlog.html">
                    <button class="add-btn">Thêm mới bài viết</button>
                </a>

                <h1 class="page-title">Quản lý bài viết</h1>
            </div>

            <div class="table-wrapper">
                <table class="article-table">
                    <thead>
                        <tr>
                            <th>Ảnh</th>
                            <th>Tiêu đề</th>
                            <th>Chủ đề</th>
                            <th>Nội dung</th>
                            <th>Trạng thái</th>
                            <th>Chỉnh sửa trạng thái</th>
                            <th>Hành động</th>
                        </tr>
                    </thead>
                    <tbody id="articleTableBody"></tbody>
                </table>
            </div>

            <div class="pagination" id="pagination"></div>

        </main>
    </div>

    <script type="module" src="../js/artical_manager.js"></script>
</body>

</html>
