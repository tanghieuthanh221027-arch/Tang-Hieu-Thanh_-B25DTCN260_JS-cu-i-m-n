<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý bài viết</title>
    <link rel="stylesheet" href="../css/article_manager.css">
    <link rel=" stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>

<body>
    <header class="topbar">
        <div class="search-container">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" placeholder="Search articles">
        </div>
        <div class="top-right">
            <i class="fa-solid fa-envelope"></i>
            <i class="fa-solid fa-bell"></i>
            <img src="https://i.pravatar.cc/40" alt="Avatar" class="avatar">
        </div>
    </header>

    <div class="container">
        <aside class="sidebar">
            <a href="../pages/user_manager.html" class="sidebar-item">
                <i class="fa-solid fa-users"></i><span>Manage Users</span>
            </a>
            <a href="../pages/entries_manager.html" class="sidebar-item">
                <i class="fa-solid fa-tags"></i><span>Manage Categories</span>
            </a>
            <a href="../pages/article_manager.html" class="sidebar-item active">
                <i class="fa-solid fa-newspaper"></i><span>Manage Article</span>
            </a>
            <a href="#" class="sidebar-item logout">
                <i class="fa-solid fa-right-from-bracket"></i><span>Log out</span>
            </a>
        </aside>

        <main class="main-content">
            <button class="btn-add-article">Thêm mới bài viết</button>
            <h1>Quản lý bài viết</h1>

            <table class="article-table">
                <thead>
                    <tr>
                        <th>Ảnh</th>
                        <th>Tiêu đề</th>
                        <th>Chủ đề</th>
                        <th>Nội dung</th>
                        <th>Trạng thái</th>
                        <th>Chỉnh sửa trạng thái</th>
                        <th>Hành động</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td><img src="https://picsum.photos/id/20/80/60" alt=""></td>
                        <td>Học nấu cà sốt cà chua</td>
                        <td>Nấu ăn</td>
                        <td>Tôi đã học được cách nấu ăn...</td>
                        <td><span class="status public">Public</span></td>
                        <td><select>
                                <option>Public</option>
                                <option>Private</option>
                            </select></td>
                        <td>
                            <button class="btn-edit">Sửa</button>
                            <button class="btn-delete">Xóa</button>
                        </td>
                    </tr>
                </tbody>
            </table>

            <div class="pagination">
                <button>← Previous</button>
                <div class="page-numbers">
                    <span class="active">1</span> 2 3 ... 8 9 10
                </div>
                <button>Next →</button>
            </div>
        </main>
    </div>
</body>

</html>
