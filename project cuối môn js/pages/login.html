<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">Login</title>

    <link rel="stylesheet" href="../css/login.css">
    <link rel="stylesheet" href="../css/responsive.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

    <div class="wrapper" id="wrapper">

        <div class="container" id="loginContainer">

            <div class="images" id="loginImageBox">
                <img id="loginImage" src="../assets/images/draw2.webp.png" alt="login image">
            </div>

            <form class="login" id="loginForm">
                <div class="social-login" id="socialLogin">
                    <span id="socialText">Sign in with</span>

                    <div class="icons" id="socialIcons">
                        <i class="fa-brands fa-square-facebook" id="facebookLogin"></i>
                        <i class="fa-brands fa-square-twitter" id="twitterLogin"></i>
                        <i class="fa-brands fa-linkedin" id="linkedinLogin"></i>
                    </div>
                </div>

                <p class="or" id="orText">Or</p>

                <div class="form-group" id="emailGroup">
                    <input id="emailInput" type="email" placeholder="Enter a valid email address">
                    <label for="emailInput" id="emailLabel">Email address</label>
                </div>

                <div class="form-group" id="passwordGroup">
                    <input id="passwordInput" type="password" placeholder="Enter password">
                    <label for="passwordInput" id="passwordLabel">Password</label>
                </div>

                <button id="loginBtn" type="submit">Login</button>

                <p class="register-text" id="registerText">
                    Don't have an account?
                    <a id="registerLink" href="../pages/register.html">Register</a>
                </p>
            </form>

        </div>

        <footer id="footer">
            <p id="copyrightText">Copyright © 2025. All rights reserved.</p>

            <div class="footer-icons" id="footerIcons">
                <i class="fa-brands fa-facebook-f" id="footerFacebook"></i>
                <i class="fa-brands fa-twitter" id="footerTwitter"></i>
                <i class="fa-brands fa-google" id="footerGoogle"></i>
                <i class="fa-brands fa-linkedin-in" id="footerLinkedin"></i>
            </div>
        </footer>

    </div>

    <script type="module" src="../js/login.js"></script>
</body>

</html>
