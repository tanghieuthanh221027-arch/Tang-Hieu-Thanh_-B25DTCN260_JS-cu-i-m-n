<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Categories</title>
    <link rel="stylesheet" href="../css/entries_manager.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>

<body>
    <header class="topbar">
        <div class="search-container">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" placeholder="Search Article Categories">
        </div>
        <div class="top-right">
            <i class="fa-solid fa-envelope"></i>
            <i class="fa-solid fa-bell"></i>
            <img src="https://i.pravatar.cc/40" alt="Avatar" class="avatar">
        </div>
    </header>

    <div class="container">
        <aside class="sidebar">
            <a href="../pages/user_manager.html" class="sidebar-item">
                <i class="fa-solid fa-users"></i><span>Manage Users</span>
            </a>
            <a href="../pages/entries_manager.html" class="sidebar-item active">
                <i class="fa-solid fa-tags"></i><span>Manage Categories</span>
            </a>
            <a href="../pages/article_manager.html" class="sidebar-item">
                <i class="fa-solid fa-newspaper"></i><span>Manage Article</span>
            </a>
            <a href="#" class="sidebar-item logout">
                <i class="fa-solid fa-right-from-bracket"></i><span>Log out</span>
            </a>
        </aside>

        <main class="main-content">
            <div class="content-header">
                <i class="fa-solid fa-folder"></i>
                <h1>Manage Categories</h1>
            </div>

            <div class="card">
                <label>Category Name:</label>
                <input type="text" placeholder="Enter category name">
                <button class="btn-add">Add Category</button>
            </div>

            <div class="card">
                <h3><i class="fa-solid fa-list"></i> Category List</h3>
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Category Name</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>1</td>
                            <td>Technology</td>
                            <td><button class="btn-edit">Edit</button> <button class="btn-delete">Delete</button></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>
</body>

</html>
